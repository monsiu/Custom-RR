name: custom_rr
description: A single home for popular Android custom ROMs and recoveries, with links, screenshots, and flashing instructions.
publish_to: 'none'
version: 1.2.0+9

# SPDX-License-Identifier: GPL-3.0-only
homepage: https://github.com/monsiu/Custom-RR
repository: https://github.com/monsiu/Custom-RR
issue_tracker: https://github.com/monsiu/Custom-RR/issues

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  url_launcher: ^6.3.1
  share_plus: ^13.0.0
  package_info_plus: ^10.0.0
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  carousel_slider: ^5.0.0
  shared_preferences: ^2.3.2
  go_router: ^14.6.2
  http: ^1.2.2
  dynamic_color: ^1.7.0
  xml: ^6.5.0
  qr_flutter: ^4.1.0
  # In-app updater: download the matching split APK from the latest
  # GitHub release and hand it to the system installer.
  dio: ^5.7.0
  device_info_plus: ^13.1.0
  open_filex: ^4.5.0
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.2
  flutter_launcher_icons: ^0.14.1
  yaml: ^3.1.2

flutter:
  uses-material-design: true

  assets:
