name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Analyze and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter --version
      - run: flutter pub get
      - run: flutter analyze
      - name: Catalog drift check
        run: dart run tool/check_catalog_drift.dart
      - run: flutter test --reporter expanded

  build-apk:
    name: Build release APKs
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Set up Android signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD:  ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASSWORD:    ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS:       ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret set (e.g. PR from a fork) - falling back to debug signing."
            exit 0
          fi
          # Strip whitespace/newlines that may have crept in via copy-paste,
          # then decode. GNU base64 fails on stray characters by default.
          printf '%s' "$KEYSTORE_BASE64" | tr -d ' \t\r\n' | base64 -d > android/app/release.jks
          if [ ! -s android/app/release.jks ]; then
            echo "::error::Decoded keystore is empty - check ANDROID_KEYSTORE_BASE64 secret."
            exit 1
          fi
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release.jks
          EOF
      - run: flutter build apk --split-per-abi --release
      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apks
          path: build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error

  build-linux:
    name: Build Linux desktop
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Linux desktop deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Stage release bundle
        run: |
          mkdir -p dist
          cp -r build/linux/x64/release/bundle custom_rr-linux-x64
          cp linux/io.github.monsiu.custom_rr.desktop custom_rr-linux-x64/
          cp linux/install.sh         custom_rr-linux-x64/
          cp images/launcher.png      custom_rr-linux-x64/io.github.monsiu.custom_rr.png
          tar -czf dist/custom_rr-linux-x64.tar.gz custom_rr-linux-x64
      - uses: actions/upload-artifact@v4
        with:
          name: custom_rr-linux-x64
          path: dist/custom_rr-linux-x64.tar.gz
          if-no-files-found: error
