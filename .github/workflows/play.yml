name: Play bundle

# Builds the Google Play App Bundle (.aab) when a release is drafted, and on
# demand via workflow_dispatch.
#
# Trigger model:
#   * `release: [created]` fires when a release draft is saved (e.g. by hand in
#     the GitHub UI). NOTE: the release pipeline (release.yml) drafts the
#     release with the default GITHUB_TOKEN, and events raised by GITHUB_TOKEN
#     cannot trigger other workflows, so release.yml ALSO dispatches this
#     workflow explicitly right after it creates the draft. Between the two
#     paths the bundle is built exactly once per draft.
#   * `workflow_dispatch` lets you build an ad-hoc bundle off any branch/commit.
#
# What it does:
#   * Builds an .aab (not per-ABI APKs); Google Play splits per-device.
#   * Sets PLAY_BUILD=true so build.gradle swaps in the Play manifest
#     (no REQUEST_INSTALL_PACKAGES) and the Dart side compiles out the in-app
#     updater and the crypto donation UI (--dart-define=PLAY_BUILD=true).
#   * Uploads the bundle as a PRIVATE workflow artifact (Actions tab), NOT
#     attached to the public release. With Play App Signing it is signed
#     differently from the GitHub APKs, so it must not be offered to end users
#     for sideloading.
#   * If the PLAY_SERVICE_ACCOUNT_JSON repo secret is set, it then uploads the
#     bundle straight to Google Play via Fastlane supply (the
#     upload_to_play_store action, called directly so it works for any checked
#     out ref). Without that secret the upload steps are skipped and the bundle
#     is only kept as a private artifact for manual upload.
#
# Auto-upload configuration:
#   * Secret PLAY_SERVICE_ACCOUNT_JSON: the Google Play service-account JSON
#     file CONTENTS (required to enable auto-upload).
#   * Variable PLAY_TRACK: target track, defaults to "alpha" (closed testing).
#   * Variable PLAY_RELEASE_STATUS: "draft" (default) just uploads the bundle;
#     set "completed" to push it to the track for your testers automatically.
on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag, branch, or commit to build (e.g. v0.2.1). Defaults to the branch this is run from.'
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-aab:
    name: Build Play App Bundle
    runs-on: ubuntu-latest
    env:
      # Set this repo secret to the Google Play service-account JSON file
      # contents to enable automatic upload. When empty the upload steps are
      # skipped and the bundle is only kept as a private artifact.
      PLAY_SA_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Manual dispatch: the chosen ref. Release draft: the draft's tag
          # (which already exists in the tag-driven pipeline). Otherwise the
          # branch this ran from.
          ref: ${{ inputs.ref || github.event.release.tag_name || github.ref }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - id: flutter_version
        run: echo "version=$(cat .flutter-version)" >> "$GITHUB_OUTPUT"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter_version.outputs.version }}
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Set up Android signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD:  ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASSWORD:    ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS:       ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::No ANDROID_KEYSTORE_BASE64 secret set. The Play bundle must be signed with the upload key."
            exit 1
          fi
          printf '%s' "$KEYSTORE_BASE64" | tr -d ' \t\r\n' | base64 -d > android/app/release.jks
          if [ ! -s android/app/release.jks ]; then
            echo "::error::Decoded keystore is empty - check ANDROID_KEYSTORE_BASE64 secret."
            exit 1
          fi
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release.jks
          EOF
      # PLAY_BUILD (env) swaps in android/app/src/play/AndroidManifest.xml so the
      # bundle has no REQUEST_INSTALL_PACKAGES and no installer/crypto query
      # intents. The matching --dart-define drops the in-app updater and crypto
      # UI. REQUIRE_RELEASE_SIGNING fails the build if the upload key is missing
      # so the .aab is never silently debug-signed.
      - name: Build App Bundle
        run: flutter build appbundle --release --dart-define=PLAY_BUILD=true
        env:
          PLAY_BUILD: "true"
          REQUIRE_RELEASE_SIGNING: "true"
      - name: Read app version
        id: appver
        # pubspec version looks like "version: 1.0.0+8":
        # name = part before '+', code = part after '+' (the Play versionCode).
        run: |
          set -euo pipefail
          raw=$(grep -E '^version:' pubspec.yaml | awk '{print $2}')
          name="${raw%+*}"
          code="${raw#*+}"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "App version: $name (versionCode $code)"
      - name: Stage Play bundle
        env:
          VNAME: ${{ steps.appver.outputs.name }}
          VCODE: ${{ steps.appver.outputs.code }}
        run: |
          set -euo pipefail
          mkdir -p dist
          # Name the bundle with the version so each build self-identifies,
          # e.g. custom_rr-v1.0.0-vc8-play-upload.aab.
          cp build/app/outputs/bundle/release/app-release.aab \
            "dist/custom_rr-v${VNAME}-vc${VCODE}-play-upload.aab"
      - uses: actions/upload-artifact@v4
        with:
          # Artifact (the downloadable zip) carries the versionCode too, so the
          # Actions page shows e.g. "play-appbundle-vc8" at a glance.
          name: play-appbundle-vc${{ steps.appver.outputs.code }}
          path: dist/custom_rr-*-play-upload.aab
          if-no-files-found: error
          retention-days: 90
      # Auto-upload to Google Play via Fastlane. Skipped unless the
      # PLAY_SERVICE_ACCOUNT_JSON secret is configured.
      - name: Set up Ruby for Fastlane
        if: ${{ env.PLAY_SA_JSON != '' }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false
      - name: Upload bundle to Google Play
        if: ${{ env.PLAY_SA_JSON != '' }}
        env:
          # Repo variables let you change the destination without editing this
          # file. Defaults: alpha (closed testing) track, draft release.
          PLAY_TRACK: ${{ vars.PLAY_TRACK || 'alpha' }}
          PLAY_RELEASE_STATUS: ${{ vars.PLAY_RELEASE_STATUS || 'draft' }}
          VNAME: ${{ steps.appver.outputs.name }}
          VCODE: ${{ steps.appver.outputs.code }}
        run: |
          set -euo pipefail
          key="$RUNNER_TEMP/play-service-account.json"
          printf '%s' "$PLAY_SA_JSON" > "$key"
          trap 'rm -f "$key"' EXIT
          export PLAY_JSON_KEY="$key"
          export PLAY_AAB_PATH="dist/custom_rr-v${VNAME}-vc${VCODE}-play-upload.aab"
          gem install fastlane --no-document
          # Call the supply action directly instead of a Fastfile lane so the
          # upload works no matter which ref was checked out (release tags cut
          # before this lane existed would otherwise fail "could not find lane").
          fastlane run upload_to_play_store \
            package_name:io.github.monsiu.custom_rr \
            aab:"$PLAY_AAB_PATH" \
            json_key:"$PLAY_JSON_KEY" \
            track:"$PLAY_TRACK" \
            release_status:"$PLAY_RELEASE_STATUS" \
            skip_upload_apk:true \
            skip_upload_metadata:true \
            skip_upload_images:true \
            skip_upload_screenshots:true \
            skip_upload_changelogs:true \
            changes_not_sent_for_review:true
