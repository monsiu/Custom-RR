name: Play bundle

# Builds the Google Play App Bundle (.aab) on demand via workflow_dispatch.
#
# On version tags the .aab is built by release.yml's build-play job and
# attached to the GitHub release, so this workflow no longer triggers on tags
# to avoid building the bundle twice. Use it for ad-hoc Play bundles off a
# branch or commit without cutting a release.
#
# This is intentionally separate from release.yml's other jobs:
#   * It builds an .aab (not per-ABI APKs); Google Play splits per-device.
#   * It sets PLAY_BUILD=true so build.gradle swaps in the Play manifest
#     (no REQUEST_INSTALL_PACKAGES) and the Dart side compiles out the in-app
#     updater and the crypto donation UI (--dart-define=PLAY_BUILD=true).
#   * The bundle is uploaded as a PRIVATE workflow artifact (Actions tab),
#     NOT attached to a public release. With Play App Signing it is signed
#     differently from the GitHub APKs, so it should not be offered to end
#     users for sideloading.
#
# Download the artifact from the workflow run page, then upload it to the
# Play Console manually. This workflow does not auto-publish to Google Play.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag, branch, or commit to build (e.g. v0.2.1). Defaults to the branch this is run from.'
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-aab:
    name: Build Play App Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - id: flutter_version
        run: echo "version=$(cat .flutter-version)" >> "$GITHUB_OUTPUT"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter_version.outputs.version }}
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Set up Android signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD:  ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASSWORD:    ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS:       ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::No ANDROID_KEYSTORE_BASE64 secret set. The Play bundle must be signed with the upload key."
            exit 1
          fi
          printf '%s' "$KEYSTORE_BASE64" | tr -d ' \t\r\n' | base64 -d > android/app/release.jks
          if [ ! -s android/app/release.jks ]; then
            echo "::error::Decoded keystore is empty - check ANDROID_KEYSTORE_BASE64 secret."
            exit 1
          fi
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release.jks
          EOF
      # PLAY_BUILD (env) swaps in android/app/src/play/AndroidManifest.xml so the
      # bundle has no REQUEST_INSTALL_PACKAGES and no installer/crypto query
      # intents. The matching --dart-define drops the in-app updater and crypto
      # UI. REQUIRE_RELEASE_SIGNING fails the build if the upload key is missing
      # so the .aab is never silently debug-signed.
      - name: Build App Bundle
        run: flutter build appbundle --release --dart-define=PLAY_BUILD=true
        env:
          PLAY_BUILD: "true"
          REQUIRE_RELEASE_SIGNING: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: play-appbundle
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 30
