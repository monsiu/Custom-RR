name: sync-catalog

# Weekly run of tool/sync_catalog.dart against upstream sources. If
# the regenerated assets/catalog.json differs from main, open a PR so
# the change is reviewed before users see it via the in-app remote
# fetch. Manual `workflow_dispatch` is also exposed.

on:
  schedule:
    # Mondays at 07:00 UTC.
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Regenerate catalog
        run: dart run tool/sync_catalog.dart --refresh

      - name: Open PR if catalog changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(catalog): weekly automated refresh"
          title: "chore(catalog): weekly automated refresh"
          body: |
            Automated catalog refresh from upstream sources (LineageOS
            wiki + PixelOS official_devices). Review the diff and merge
            if it looks reasonable.

            Triggered by the weekly `sync-catalog` workflow.
          branch: chore/weekly-catalog-refresh
          delete-branch: true
          add-paths: |
            assets/catalog.json
