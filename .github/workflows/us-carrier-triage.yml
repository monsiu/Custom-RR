name: US carrier request triage

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  flag-us-carrier:
    if: ${{ contains(github.event.issue.labels.*.name, 'device') || contains(github.event.issue.labels.*.name, 'request') }}
    runs-on: ubuntu-latest
    steps:
      - name: Flag and close US carrier requests
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || "";
            const isUsCarrier = body.includes("Yes, it's a US model or bought from a US carrier");
            if (!isUsCarrier) {
              core.info("Not flagged as a US carrier device; nothing to do.");
              return;
            }

            const message = [
              "Hey, thanks a lot for filling this out! 🙏",
              "",
              "Quick honest heads-up though: you marked this as a US model / bought from a US carrier, and that's basically the one case where our hands are tied. US carrier phones (Samsung model numbers ending in `U` or `U1`, and pretty much anything from Verizon, AT&T, T-Mobile and co) ship with the bootloader locked, and Samsung or the carrier don't hand out a way to unlock it. No bootloader unlock means no custom recovery and no custom ROM can be flashed, even when the exact same phone sold in another region can. So there's realistically nothing we can add that would actually run on your unit.",
              "",
              "am going to close this one out for now, but if you reckon this is off, say your phone actually has the **OEM unlocking** toggle in Developer options, or it turns out to be an international / factory-unlocked unit, just reply here and we'll happily take another look. 👍",
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message,
            });

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ["us-locked"],
              });
            } catch (e) {
              core.warning(`Could not add the us-locked label: ${e.message}`);
            }

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed",
              state_reason: "not_planned",
            });
