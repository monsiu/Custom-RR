name: Release

# Triggered when a tag like v0.1.0 is pushed, or manually dispatched
# by .github/workflows/auto-tag.yml after it pushes a new tag (because
# the default GITHUB_TOKEN cannot trigger workflows via push events).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.1). Must already exist.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-android:
    name: Build release APKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Set up Android signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD:  ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASSWORD:    ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS:       ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret set - falling back to debug signing."
            exit 0
          fi
          printf '%s' "$KEYSTORE_BASE64" | tr -d ' \t\r\n' | base64 -d > android/app/release.jks
          if [ ! -s android/app/release.jks ]; then
            echo "::error::Decoded keystore is empty - check ANDROID_KEYSTORE_BASE64 secret."
            exit 1
          fi
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release.jks
          EOF
      # Per-ABI split: produces armeabi-v7a / arm64-v8a / x86_64 APKs
      # with appropriate versionCode offsets (+1000 / +2000 / +4000),
      # which is the form F-Droid-style updaters expect.
      - run: flutter build apk --split-per-abi --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error

  build-linux:
    name: Build Linux desktop bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Install Linux desktop deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Stage release bundle
        run: |
          mkdir -p dist
          cp -r build/linux/x64/release/bundle custom_rr-linux-x64
          cp linux/io.github.monsiu.custom_rr.desktop custom_rr-linux-x64/
          cp linux/install.sh         custom_rr-linux-x64/
          cp images/launcher.png      custom_rr-linux-x64/io.github.monsiu.custom_rr.png
          tar -czf dist/custom_rr-linux-x64.tar.gz custom_rr-linux-x64
      - uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: dist/custom_rr-linux-x64.tar.gz
          if-no-files-found: error

  publish:
    name: Publish draft release
    needs: [build-android, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.apk' -o -name '*.tar.gz' \) \
            -exec cp {} release-assets/ \;
          ls -la release-assets
      - name: Build release notes
        id: notes
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # If RELEASE_NOTES.md is checked in, use it verbatim.
          if [ -f RELEASE_NOTES.md ]; then
            echo "Using RELEASE_NOTES.md"
            cp RELEASE_NOTES.md body.md
          else
            # Otherwise build notes from git log between the previous tag and this one.
            PREV=$(git tag --list 'v*' --sort=-version:refname \
              | grep -vFx "$TAG" | head -n1 || true)
            {
              echo "## What's changed"
              echo
              if [ -n "$PREV" ]; then
                echo "Changes since [\`$PREV\`](https://github.com/$REPO/releases/tag/$PREV):"
                echo
                git log --no-merges --pretty='- %s ([\`%h\`](https://github.com/'"$REPO"'/commit/%H))' "$PREV..$TAG"
                echo
                echo "**Full Changelog**: https://github.com/$REPO/compare/$PREV...$TAG"
              else
                echo "First release. Highlights from the commit history:"
                echo
                git log --no-merges --pretty='- %s ([\`%h\`](https://github.com/'"$REPO"'/commit/%H))' "$TAG"
                echo
                echo "**Full Changelog**: https://github.com/$REPO/commits/$TAG"
              fi
            } > body.md
          fi
          echo "----- body.md -----"
          cat body.md
      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: false
          name: ${{ inputs.tag || github.ref_name }}
          tag_name: ${{ inputs.tag || github.ref_name }}
          body_path: body.md
          files: release-assets/*
