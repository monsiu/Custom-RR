name: Release

# Triggered when a tag like v0.1.0 is pushed, or manually dispatched
# by .github/workflows/auto-tag.yml after it pushes a new tag (because
# the default GITHUB_TOKEN cannot trigger workflows via push events).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.1). Must already exist.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-android:
    name: Build release APKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - id: flutter_version
        run: echo "version=$(cat .flutter-version)" >> "$GITHUB_OUTPUT"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter_version.outputs.version }}
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Set up Android signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD:  ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASSWORD:    ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS:       ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret set - falling back to debug signing."
            exit 0
          fi
          printf '%s' "$KEYSTORE_BASE64" | tr -d ' \t\r\n' | base64 -d > android/app/release.jks
          if [ ! -s android/app/release.jks ]; then
            echo "::error::Decoded keystore is empty - check ANDROID_KEYSTORE_BASE64 secret."
            exit 1
          fi
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release.jks
          EOF
      # Per-ABI split: produces armeabi-v7a / arm64-v8a / x86_64 APKs.
      # build.gradle gives each split a distinct versionCode (abiCode * 1000 +
      # base, i.e. 1xxx / 2xxx / 3xxx), continuous with the codes v0.2.0 shipped
      # so the in-app updater can install over an earlier release.
      # REQUIRE_RELEASE_SIGNING makes build.gradle fail if the release keystore is
      # missing, so a published release is never silently debug-signed (which would
      # break in-place updates with "package appears to be invalid").
      - run: flutter build apk --split-per-abi --release
        env:
          REQUIRE_RELEASE_SIGNING: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error

  build-linux:
    name: Build Linux desktop bundle (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Install Linux desktop deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev
      - name: Set up Flutter (x64, cached)
        if: matrix.arch == 'x64'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Set up Flutter (arm64, git clone)
        if: matrix.arch == 'arm64'
        # subosito/flutter-action@v2 has no Linux arm64 archive in its
        # manifest ("Unable to determine Flutter version for ... arm64").
        # Clone the official stable channel from flutter/flutter instead;
        # Flutter natively supports Linux arm64.
        run: |
          set -euo pipefail
          git clone --depth 1 -b stable https://github.com/flutter/flutter.git "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          "$HOME/flutter/bin/flutter" --version
          "$HOME/flutter/bin/flutter" precache --linux
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Stage release bundle
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          mkdir -p dist
          dir="custom_rr-${TAG}-linux-${ARCH}"
          cp -r "build/linux/${ARCH}/release/bundle" "$dir"
          cp linux/io.github.monsiu.custom_rr.desktop "$dir/"
          cp linux/install.sh         "$dir/"
          cp images/launcher.png      "$dir/io.github.monsiu.custom_rr.png"
          tar -czf "dist/${dir}.tar.gz" "$dir"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-bundle-${{ matrix.arch }}
          path: dist/custom_rr-*-linux-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  build-windows:
    name: Build Windows desktop bundle (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
          - arch: arm64
            runner: windows-11-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Set up Flutter (x64, cached)
        if: matrix.arch == 'x64'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Set up Flutter (arm64, git clone)
        if: matrix.arch == 'arm64'
        shell: pwsh
        # subosito/flutter-action@v2 has no Windows arm64 archive in its
        # manifest. Clone the official stable channel from flutter/flutter
        # instead; Flutter natively supports Windows arm64.
        run: |
          $ErrorActionPreference = 'Stop'
          $flutterDir = Join-Path $env:USERPROFILE 'flutter'
          git clone --depth 1 -b stable https://github.com/flutter/flutter.git $flutterDir
          Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $flutterDir 'bin')
          & (Join-Path $flutterDir 'bin\flutter.bat') --version
          & (Join-Path $flutterDir 'bin\flutter.bat') precache --windows
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Stage release zip
        shell: pwsh
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $dir = "custom_rr-$env:TAG-windows-$env:ARCH"
          # Flutter emits to build/windows/<arch>/runner/Release on modern Flutter;
          # fall back to the older build/windows/runner/Release path used on some channels.
          $src = "build/windows/$env:ARCH/runner/Release"
          if (-not (Test-Path $src)) { $src = 'build/windows/runner/Release' }
          Copy-Item -Recurse -Force $src $dir

          # Bundle the MSVC runtime so users do not need the VC++
          # Redistributable installed. windows-latest / windows-11-arm both
          # ship Visual Studio with vswhere; use it to find the latest
          # installed redist dir for the right CPU arch.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath  = & $vswhere -latest -property installationPath
          if (-not $vsPath) { throw "vswhere could not find a Visual Studio install" }
          $redistRoot = Join-Path $vsPath 'VC\Redist\MSVC'
          $crt = Get-ChildItem -Path $redistRoot -Directory |
                 Sort-Object Name -Descending |
                 ForEach-Object { Join-Path $_.FullName "$env:ARCH\Microsoft.VC143.CRT" } |
                 Where-Object { Test-Path $_ } |
                 Select-Object -First 1
          if (-not $crt) { throw "Could not locate $env:ARCH\Microsoft.VC143.CRT under $redistRoot" }
          foreach ($dll in 'msvcp140.dll','vcruntime140.dll','vcruntime140_1.dll') {
            Copy-Item -Force (Join-Path $crt $dll) -Destination $dir
          }

          Compress-Archive -Path $dir -DestinationPath "dist/$dir.zip" -Force
      - uses: actions/upload-artifact@v4
        with:
          name: windows-bundle-${{ matrix.arch }}
          path: dist/custom_rr-*-windows-${{ matrix.arch }}.zip
          if-no-files-found: error

  build-macos:
    name: Build macOS desktop bundle
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Set up Flutter (cached)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      # Unsigned build. macOS Gatekeeper will warn on first launch; users
      # right-click -> Open once to run it. Code signing + notarization can be
      # added later (needs a paid Apple Developer account).
      - run: flutter build macos --release
      - name: Stage release bundle
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          app_dir="build/macos/Build/Products/Release"
          app_name=$(ls "$app_dir" | grep '.app$' | head -n1)
          # Flutter builds a universal (arm64 + Intel) binary, so one zip
          # covers Apple Silicon and Intel Macs. Use ditto to preserve the
          # .app bundle structure and resource forks.
          ditto -c -k --sequesterRsrc --keepParent \
            "$app_dir/$app_name" "dist/custom_rr-${TAG}-macos-universal.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-bundle
          path: dist/custom_rr-*-macos-universal.zip
          if-no-files-found: error

  publish:
    name: Publish draft release
    needs: [build-android, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          # Linux tarball + Windows zip: already nicely named in their build jobs.
          find artifacts -type f -name '*.tar.gz' -exec cp {} release-assets/ \;
          find artifacts -type f -name '*.zip'    -exec cp {} release-assets/ \;
          # APKs come out as app-<abi>-release.apk; rename to custom_rr-<tag>-<abi>.apk.
          for src in $(find artifacts -type f -name 'app-*-release.apk'); do
            base=$(basename "$src")
            abi=${base#app-}
            abi=${abi%-release.apk}
            cp "$src" "release-assets/custom_rr-${TAG}-${abi}.apk"
          done
          ls -la release-assets
      - name: Build release notes
        id: notes
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # If RELEASE_NOTES.md is checked in, use it verbatim.
          if [ -f RELEASE_NOTES.md ]; then
            echo "Using RELEASE_NOTES.md"
            cp RELEASE_NOTES.md body.md
          else
            # Otherwise build notes from git log between the previous tag and this one.
            PREV=$(git tag --list 'v*' --sort=-version:refname \
              | grep -vFx "$TAG" | head -n1 || true)
            {
              echo "## What's changed"
              echo
              if [ -n "$PREV" ]; then
                echo "Changes since [\`$PREV\`](https://github.com/$REPO/releases/tag/$PREV):"
                echo
                git log --no-merges --pretty='- %s ([\`%h\`](https://github.com/'"$REPO"'/commit/%H))' "$PREV..$TAG"
                echo
                echo "**Full Changelog**: https://github.com/$REPO/compare/$PREV...$TAG"
              else
                echo "First release. Highlights from the commit history:"
                echo
                git log --no-merges --pretty='- %s ([\`%h\`](https://github.com/'"$REPO"'/commit/%H))' "$TAG"
                echo
                echo "**Full Changelog**: https://github.com/$REPO/commits/$TAG"
              fi
            } > body.md
          fi
          echo "----- body.md -----"
          cat body.md
      - name: Publish draft release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: false
          name: ${{ inputs.tag || github.ref_name }}
          tag_name: ${{ inputs.tag || github.ref_name }}
          body_path: body.md
          files: release-assets/*
      - name: Force-refresh release body
        # softprops/action-gh-release does not reliably overwrite the body of
        # an existing draft release on subsequent runs, so PATCH it directly
        # to guarantee the published draft matches body.md.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_ID: ${{ steps.release.outputs.id }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_ID:-}" ]; then
            echo "No release id from softprops; skipping body refresh."
            exit 0
          fi
          python3 - <<'PY'
          import json, os, urllib.request
          body = open('body.md').read()
          req = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['REPO']}/releases/{os.environ['RELEASE_ID']}",
              method='PATCH',
              data=json.dumps({'body': body}).encode(),
              headers={
                  'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
                  'Accept': 'application/vnd.github+json',
                  'Content-Type': 'application/json',
              },
          )
          r = urllib.request.urlopen(req)
          d = json.load(r)
          print(f"Body refreshed: {len(d['body'] or '')} chars")
          PY
      - name: Trigger Play bundle build
        # The draft above is created with the default GITHUB_TOKEN, and events
        # raised by GITHUB_TOKEN cannot trigger other workflows, so the
        # `release: [created]` trigger in play.yml never fires for the
        # automated pipeline. Dispatch it explicitly here. The tag already
        # exists (auto-tag.yml pushes it before release.yml runs), so play.yml
        # checks it out and builds the .aab against the same commit.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: gh workflow run play.yml --ref "$TAG"

