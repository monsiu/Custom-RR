name: "Request a catalog entry"
description: "Ask us to add a custom ROM, recovery, GSI, or root solution to the Custom RR catalog"
labels: ["request"]
body:
  - type: markdown
    attributes:
      value: "Thanks for helping grow the Custom RR catalog. Please fill in what you can."
  - type: dropdown
    id: kind
    attributes:
      label: What should we add?
      options:
        - "Custom ROM"
        - "Recovery"
        - "GSI (Treble generic system image)"
        - "Root solution"
    validations:
      required: true
  - type: input
    id: name
    attributes:
      label: Name
      placeholder: "e.g. PixelOS / OrangeFox"
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Official website or source
      description: "Project site, GitHub, XDA thread, or Telegram."
      placeholder: "https://..."
    validations:
      required: true
  - type: textarea
    id: devices
    attributes:
      label: Supported devices
      description: "Device codenames if you know them (e.g. sunny, lisa)."
  - type: dropdown
    id: us_variant
    attributes:
      label: Is this for a US model or carrier variant?
      description: "If this request is for your own phone: US carrier phones (Samsung model numbers ending in U or U1, or anything bought from Verizon, AT&T, T-Mobile, etc.) usually ship with a locked bootloader that can't be unlocked, so no recovery or custom ROM can be flashed. If this is a general project request not tied to one phone, pick No."
      options:
        - "No, it's an international / global / factory-unlocked model"
        - "Yes, it's a US model or bought from a US carrier"
        - "Not sure"
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Anything else?
      description: "Maintainer, release cadence, why it should be added, etc."
