name: "Bug report"
description: "Report a problem with Custom RR"
labels: ["bug"]
body:
  - type: input
    id: device
    attributes:
      label: Device & Android version
      placeholder: "e.g. Pixel 7, Android 14"
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: Custom RR version
      placeholder: "e.g. 0.3.0+3 (see About page)"
    validations:
      required: true
  - type: textarea
    id: describe
    attributes:
      label: What happened?
      description: "Describe the bug clearly. Include steps to reproduce."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: "Optional. Paste `flutter logs` output or attach screenshots."
