name: "Feature request"
description: "Suggest an app feature or improvement for Custom RR"
labels: ["enhancement"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Request type
      options:
        - "App feature"
        - "Other"
    validations:
      required: true
  - type: input
    id: name
    attributes:
      label: Name
      placeholder: "e.g. Filter ROMs by Android version"
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Reference link
      placeholder: "https://... (optional)"
  - type: textarea
    id: details
    attributes:
      label: Details
      description: "Anything we should know: what problem it solves, how you'd expect it to work, etc."
