version: 2
updates:
  - package-ecosystem: pub
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"

  - package-ecosystem: gradle
    directory: "/android"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    commit-message:
      prefix: "android"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
