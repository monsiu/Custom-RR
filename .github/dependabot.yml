version: 2
updates:
  - package-ecosystem: pub
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      # Batch low-risk minor/patch bumps into one PR to cut noise; majors
      # stay individual and are never auto-merged.
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: gradle
    directory: "/android"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    commit-message:
      prefix: "android"
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
