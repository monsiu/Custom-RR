plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "io.github.monsiu.custom_rr"
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    // Store-variant manifest swaps. The default `flutter build apk` and the
    // GitHub release workflow keep the stock src/main/AndroidManifest.xml.
    //
    // Google Play (PLAY_BUILD=true): swap in a manifest WITHOUT the
    // REQUEST_INSTALL_PACKAGES permission, the APK-installer query intent, the
    // crypto-wallet query intents, and the updater-only media/storage perms.
    // Pair it with `--dart-define=PLAY_BUILD=true` so the Dart side also drops
    // the in-app updater and the crypto donation UI.
    //
    // F-Droid (FDROID_BUILD=true): swap in a manifest WITHOUT
    // REQUEST_INSTALL_PACKAGES, the APK-installer query intent, and the
    // updater-only media/storage perms, but KEEPING the crypto-wallet query
    // intents (the F-Droid build keeps the donation UI). Pair it with
    // `--dart-define=FDROID_BUILD=true` so the Dart side drops the in-app
    // updater. The recipe must export FDROID_BUILD=true so this swap fires.
    if (System.getenv("PLAY_BUILD") == "true") {
        sourceSets {
            main.manifest.srcFile "src/play/AndroidManifest.xml"
        }
    } else if (System.getenv("FDROID_BUILD") == "true") {
        sourceSets {
            main.manifest.srcFile "src/fdroid/AndroidManifest.xml"
        }
    }

    // Strip the AGP "Dependency metadata" block that F-Droid's scanner rejects
    // as an extra signing block.
    dependenciesInfo {
        includeInApk false
        includeInBundle false
    }

    defaultConfig {
        applicationId "io.github.monsiu.custom_rr"
        minSdkVersion flutter.minSdkVersion
        targetSdk 36
        // Literal values (kept in sync with pubspec.yaml) so F-Droid's
        // checkupdates can parse versionCode/versionName from the git tag.
        // Bump both here and in pubspec.yaml on every release.
        versionCode 12
        versionName "1.3.2"
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias keystoreProperties["keyAlias"]
                keyPassword keystoreProperties["keyPassword"]
                storeFile keystoreProperties["storeFile"] ? file(keystoreProperties["storeFile"]) : null
                storePassword keystoreProperties["storePassword"]
            }
        }
    }

    buildTypes {
        release {
            // Falls back to debug signing if key.properties is absent (so `flutter run --release`
            // works locally and fork PR builds can still produce throwaway APKs). The publishing
            // workflow sets REQUIRE_RELEASE_SIGNING=true so a release that is about to be uploaded
            // fails loudly here instead of silently shipping a debug-signed APK that users cannot
            // install over an earlier release-signed build ("package appears to be invalid").
            if (System.getenv("REQUIRE_RELEASE_SIGNING") == "true" && !keystorePropertiesFile.exists()) {
                throw new RuntimeException(
                    "REQUIRE_RELEASE_SIGNING is set but android/key.properties is missing. " +
                    "Provide the release keystore (ANDROID_KEYSTORE_BASE64 and friends) so the " +
                    "APK is signed with the published release key.")
            }
            signingConfig keystorePropertiesFile.exists() ? signingConfigs.release : signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    // The release channel ships one APK per ABI (flutter build apk
    // --split-per-abi), so each split needs a distinct versionCode. Use the
    // stock Flutter split scheme base * 1000 + abiCode, which keeps the ABI in
    // the low-order digits (armeabi-v7a -> x001, arm64-v8a -> x002,
    // x86_64 -> x003). F-Droid requires the ABI in the low-order position, and
    // this also stays continuous with prior releases: with base 6 the codes are
    // 6001 / 6002 / 6003, which sit above v0.2.2's 1005 / 2005 / 3005 so the
    // in-app updater can install over an existing build instead of treating the
    // update as a downgrade.
    def abiVersionCodes = ["armeabi-v7a": 1, "arm64-v8a": 2, "x86_64": 3]
    applicationVariants.all { variant ->
        variant.outputs.each { output ->
            def abi = output.filters.find { it.filterType == "ABI" }?.identifier
            def abiCode = abiVersionCodes[abi]
            if (abiCode != null) {
                output.versionCodeOverride = variant.versionCode * 1000 + abiCode
            }
        }
    }
}

flutter {
    source "../.."
}

// The Flutter embedding references the proprietary Google Play Core library
// (SplitCompat/SplitInstall) for deferred components, which this app does not
// use. F-Droid's scanner rejects those classes as non-free. Two layers keep
// them out of the APK:
//   1) exclude the Maven group so it is never on the compile classpath, and
//   2) (see proguard-rules.pro) avoid a catch-all keep on io.flutter.** so R8
//      can tree-shake the unreachable PlayStoreDeferredComponentManager, which
//      is what actually drags the Play Core classes into the dex.
configurations.all {
    exclude group: "com.google.android.play"
}

dependencies {
    implementation "com.google.android.material:material:1.14.0"
}

