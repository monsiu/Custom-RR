plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "io.github.monsiu.custom_rr"
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    // Strip the AGP "Dependency metadata" block that F-Droid's scanner rejects
    // as an extra signing block.
    dependenciesInfo {
        includeInApk false
        includeInBundle false
    }

    defaultConfig {
        applicationId "io.github.monsiu.custom_rr"
        minSdkVersion flutter.minSdkVersion
        targetSdk 36
        // Literal values (kept in sync with pubspec.yaml) so F-Droid's
        // checkupdates can parse versionCode/versionName from the git tag.
        // Bump both here and in pubspec.yaml on every release.
        versionCode 4
        versionName "0.2.1"
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias keystoreProperties["keyAlias"]
                keyPassword keystoreProperties["keyPassword"]
                storeFile keystoreProperties["storeFile"] ? file(keystoreProperties["storeFile"]) : null
                storePassword keystoreProperties["storePassword"]
            }
        }
    }

    buildTypes {
        release {
            // Falls back to debug signing if key.properties is absent (so `flutter run --release` works locally).
            signingConfig keystorePropertiesFile.exists() ? signingConfigs.release : signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    // F-Droid ships one APK per ABI (flutter build apk --split-per-abi), so each
    // split needs a distinct versionCode to coexist in the repo. Use the scheme
    // base * 10 + abiCode, which matches the VercodeOperation in the fdroiddata
    // metadata (armeabi-v7a -> +1, arm64-v8a -> +2, x86_64 -> +3). A universal
    // (non-split) build has no ABI filter and keeps the base versionCode.
    def abiVersionCodes = ["armeabi-v7a": 1, "arm64-v8a": 2, "x86_64": 3]
    applicationVariants.all { variant ->
        variant.outputs.each { output ->
            def abi = output.filters.find { it.filterType == "ABI" }?.identifier
            def abiCode = abiVersionCodes[abi]
            if (abiCode != null) {
                output.versionCodeOverride = variant.versionCode * 10 + abiCode
            }
        }
    }
}

flutter {
    source "../.."
}

// The Flutter embedding references the proprietary Google Play Core library
// (SplitCompat/SplitInstall) for deferred components, which this app does not
// use. F-Droid's scanner rejects those classes as non-free. Two layers keep
// them out of the APK:
//   1) exclude the Maven group so it is never on the compile classpath, and
//   2) (see proguard-rules.pro) avoid a catch-all keep on io.flutter.** so R8
//      can tree-shake the unreachable PlayStoreDeferredComponentManager, which
//      is what actually drags the Play Core classes into the dex.
configurations.all {
    exclude group: "com.google.android.play"
}

dependencies {
    implementation "com.google.android.material:material:1.12.0"
}

