plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "io.github.monsiu.custom_rr"
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    // Strip the AGP "Dependency metadata" block that F-Droid's scanner rejects
    // as an extra signing block.
    dependenciesInfo {
        includeInApk false
        includeInBundle false
    }

    defaultConfig {
        applicationId "io.github.monsiu.custom_rr"
        minSdkVersion flutter.minSdkVersion
        targetSdk 36
        // Literal values (kept in sync with pubspec.yaml) so F-Droid's
        // checkupdates can parse versionCode/versionName from the git tag.
        // Bump both here and in pubspec.yaml on every release.
        versionCode 4
        versionName "0.2.1"
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias keystoreProperties["keyAlias"]
                keyPassword keystoreProperties["keyPassword"]
                storeFile keystoreProperties["storeFile"] ? file(keystoreProperties["storeFile"]) : null
                storePassword keystoreProperties["storePassword"]
            }
        }
    }

    buildTypes {
        release {
            // Falls back to debug signing if key.properties is absent (so `flutter run --release` works locally).
            signingConfig keystorePropertiesFile.exists() ? signingConfigs.release : signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

flutter {
    source "../.."
}

// The Flutter embedding pulls in the proprietary Google Play Core library
// (SplitCompat/SplitInstall) for deferred components, which this app does not
// use. F-Droid's scanner flags those classes as non-free, so drop them.
configurations.all {
    exclude group: "com.google.android.play", module: "core"
}

dependencies {
    implementation "com.google.android.material:material:1.12.0"
}

