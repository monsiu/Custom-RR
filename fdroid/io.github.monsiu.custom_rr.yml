# F-Droid build recipe for Custom RR.
#
# This file is NOT used by the app build. It is the metadata recipe that
# goes into F-Droid's data repo. To submit:
#
#   1. Fork https://gitlab.com/fdroid/fdroiddata
#   2. Copy this file to  metadata/io.github.monsiu.custom_rr.yml
#   3. Run  fdroid lint io.github.monsiu.custom_rr  and
#           fdroid build io.github.monsiu.custom_rr  locally if you can
#   4. Open a merge request.
#
# Lines marked "VERIFY" below should be double-checked against the actual
# tagged release before submitting.

