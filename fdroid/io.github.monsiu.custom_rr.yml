# F-Droid build recipe for Custom RR.
#
# This file is NOT used by the app build. It is the metadata recipe that
# goes into F-Droid's data repo. To submit:
#
#   1. Fork https://gitlab.com/fdroid/fdroiddata
#   2. Copy this file to  metadata/io.github.monsiu.custom_rr.yml
#   3. Run  fdroid lint io.github.monsiu.custom_rr  and
#           fdroid build io.github.monsiu.custom_rr  locally if you can
#   4. Open a merge request.
#
# Lines marked "VERIFY" below should be double-checked against the actual
# tagged release before submitting.

Categories:
  - System
License: GPL-3.0-only
AuthorName: monsiu
AuthorWebSite: https://monsiu.github.io/
WebSite: https://github.com/monsiu/Custom-RR
SourceCode: https://github.com/monsiu/Custom-RR
IssueTracker: https://github.com/monsiu/Custom-RR/issues
Changelog: https://github.com/monsiu/Custom-RR/blob/HEAD/CHANGELOG.md
# VERIFY: donation link must be confirmed by upstream (it is: same GitHub account).
Donate: https://buymeacoffee.com/monsiutech

AutoName: Custom RR

RepoType: git
Repo: https://github.com/monsiu/Custom-RR.git

Builds:
  - versionName: 0.2.2
    versionCode: 1005
    commit: c7f8060ef6494f4ad8737f25fa392cb13e19b3b3
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - export flutterVersion=$(cat .flutter-version)
      - git -C $$flutter$$ checkout -f $flutterVersion
      - $$flutter$$/bin/flutter config --no-analytics --no-cli-animations
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --split-per-abi --target-platform=android-arm
        --release --dart-define=FDROID_BUILD=true

  - versionName: 0.2.2
    versionCode: 2005
    commit: c7f8060ef6494f4ad8737f25fa392cb13e19b3b3
    output: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - export flutterVersion=$(cat .flutter-version)
      - git -C $$flutter$$ checkout -f $flutterVersion
      - $$flutter$$/bin/flutter config --no-analytics --no-cli-animations
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --split-per-abi --target-platform=android-arm64
        --release --dart-define=FDROID_BUILD=true

  - versionName: 0.2.2
    versionCode: 3005
    commit: c7f8060ef6494f4ad8737f25fa392cb13e19b3b3
    output: build/app/outputs/flutter-apk/app-x86_64-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - export flutterVersion=$(cat .flutter-version)
      - git -C $$flutter$$ checkout -f $flutterVersion
      - $$flutter$$/bin/flutter config --no-analytics --no-cli-animations
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --split-per-abi --target-platform=android-x64
        --release --dart-define=FDROID_BUILD=true

MaintainerNotes: |-
  Flutter app. Built with the F-Droid `flutter` srclib on the stable channel,
  checked out to the exact version pinned in the repo's .flutter-version file
  ($flutterVersion), so the toolchain is the prebuilt-but-FLOSS Flutter SDK
  that the inclusion policy explicitly permits.

  The GitHub release channel ships one APK per ABI (flutter build apk
  --split-per-abi), and android/app/build.gradle gives each split a distinct
  versionCode with the scheme abiCode * 1000 + base (armeabi-v7a -> 1xxx,
  arm64-v8a -> 2xxx, x86_64 -> 3xxx). The build entries above mirror that, so
  the VercodeOperation below must stay 1000/2000/3000 + %c to match the code
  embedded in each APK. (The base %c comes from pubspec.yaml's +N build
  number: 5 for 0.2.2, giving 1005/2005/3005.)

  The `--dart-define=FDROID_BUILD=true` flag compiles out the app's
  self-update machinery (see lib/util/build_flags.dart): no GitHub release
  polling, no in-app APK download/install path, and no "Check for updates"
  UI. The GitHub-release variant keeps it; the F-Droid variant does not, so
  there is no UpdateCheck anti-feature and no APK side-loading to flag.

  Signing: android/app/build.gradle falls back to debug signing when
  android/key.properties is absent (it is not committed), so the build
  produces an unsigned-by-upstream APK that F-Droid signs with its own key.

  REQUEST_INSTALL_PACKAGES remains declared in the manifest but is unused in
  the F-Droid variant because the installer code path is gated off.

AutoUpdateMode: Version v%v
UpdateCheckMode: Tags ^v[0-9.]+$
VercodeOperation:
  - 1000 + %c
  - 2000 + %c
  - 3000 + %c
UpdateCheckData: pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+
CurrentVersion: 0.2.2
CurrentVersionCode: 3005
